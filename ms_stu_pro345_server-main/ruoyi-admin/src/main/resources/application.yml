# 项目相关配置
ruoyi:
    # 名称
    name: RuoYi
    # 版本
    version: 3.8.8
    # 版权年份
    copyrightYear: 2024
    # 文件路径
    profile: ./uploadPath
    # 获取ip地址开关
    addressEnabled: false
    # 验证码类型 math 数字计算 char 字符验证
    captchaType: math


front:
    url: http://localhost:80

# 开发环境配置
server:
    # 服务器的HTTP端口，默认为11000
    port: 11345
    servlet:
        # 应用的访问路径
        context-path: /
    tomcat:
        # tomcat的URI编码
        uri-encoding: UTF-8
        # 连接数满后的排队数，默认为100
        accept-count: 1000
        threads:
            # tomcat最大线程数，默认为200
            max: 800
            # Tomcat启动初始化的线程数，默认值10
            min-spare: 100

# 日志配置
logging:
    level:
        com.ruoyi: debug
        org.springframework: warn

# 用户配置
user:
    password:
        # 密码最大错误次数
        maxRetryCount: 5
        # 密码锁定时间（默认10分钟）
        lockTime: 10

# Spring配置
spring:
    # 资源信息
    messages:
        # 国际化资源文件路径
        basename: i18n/messages
    profiles:
        active: druid
    # 文件上传
    servlet:
        # TODO：若需要修改文件上传大小限制，自行修改；
        ## 注意：并同时修改 /ruoyi-common/src/main/java/com/ruoyi/common/utils/file/FileUploadUtils.java中的【DEFAULT_MAX_SIZE】值
        multipart:
            # 单个文件大小
            max-file-size: 10MB
            # 设置总上传的文件大小
            max-request-size: 20MB
    # 服务模块
    devtools:
        restart:
            # 热部署开关
            enabled: true
    # redis 配置
    redis:
        # 地址
        host: localhost
        # 端口，默认为6379
        port: 6379
        # 数据库索引
        database: 0
        # 密码
        password:
        # 连接超时时间
        timeout: 10s
        lettuce:
            pool:
                # 连接池中的最小空闲连接
                min-idle: 0
                # 连接池中的最大空闲连接
                max-idle: 8
                # 连接池的最大数据库连接数
                max-active: 8
                # #连接池最大阻塞等待时间（使用负值表示没有限制）
                max-wait: -1ms

# token配置
token:
    # 令牌自定义标识
    header: Authorization
    # 令牌密钥
    secret: abcdefghijklmnopqrstuvwxyz
    # 令牌有效期（默认30分钟）
    expireTime: 10000

# MyBatis配置
mybatis-plus:
    # 搜索指定包别名
    typeAliasesPackage: com.ruoyi.**.domain.**
    # 配置mapper的扫描，找到所有的mapper.xml映射文件
    mapperLocations: classpath*:mapper/**/*Mapper.xml
    # 加载全局的配置文件
    configLocation: classpath:mybatis/mybatis-config.xml
    # 全局配置（直接放在mybatis-plus下，不要嵌套）
    global-config:
        db-config:
            logic-delete-field: delFlag  # 显式指定逻辑删除字段名（与实体类一致）
            logic-delete-value: 1        # 逻辑已删除值（必须与数据库字段类型一致）
            logic-not-delete-value: 0    # 逻辑未删除值


# PageHelper分页插件
pagehelper:
    helperDialect: mysql
    supportMethodsArguments: true
    params: count=countSql

# Swagger配置
swagger:
    # 是否开启swagger
    enabled: true
    # 请求前缀
    pathMapping: /

# 防止XSS攻击
xss:
    # 过滤开关
    enabled: true
    # 排除链接（多个用逗号分隔）
    excludes: /system/notice
    # 匹配链接
    urlPatterns: /system/*,/monitor/*,/tool/*

# application.yml
alipay:
    app-id: 9021000159691675 # 你的沙箱 AppID
    app-private-key:
    alipay-public-key:
    gateway-url: "https://openapi-sandbox.dl.alipaydev.com/gateway.do" # 沙箱网关
    notify-url:
    return-url: "http://localhost:11345/api/alipay/toSuccess" # 同步通知地址 (前端页面)
    charset: "UTF-8"
    format: "JSON"
    sign-type: "RSA2"
